plugins {
    id 'com.android.application'
}

android {
    namespace 'com.sunmikiosk.launcher'
    compileSdk 32

    defaultConfig {
        applicationId "com.sunmikiosk.launcher"
        minSdk 23
        targetSdk 32
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.4.2'
}
